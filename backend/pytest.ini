[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings
    --reuse-db
    --nomigrations
markers =
    unit: 单元测试标记
    integration: 集成测试标记
    performance: 性能测试标记
    slow: 慢速测试标记
    api: API测试标记
    database: 数据库测试标记
    cache: 缓存测试标记
    security: 安全测试标记
testpaths = apps/family/tests
filterwarnings =
    ignore::django.utils.deprecation.RemovedInDjango50Warning
    ignore::DeprecationWarning